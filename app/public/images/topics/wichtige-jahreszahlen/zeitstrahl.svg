<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes growLine {
      from { stroke-dashoffset: 800; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .title { animation: fadeIn 0.5s ease-out both; }
    .timeline { stroke-dasharray: 800; animation: growLine 2s ease-out both; animation-delay: 0.2s; }
    .dot { animation: scaleIn 0.3s ease-out both; }
    .d1 { animation-delay: 0.3s; }
    .d2 { animation-delay: 0.5s; }
    .d3 { animation-delay: 0.7s; }
    .d4 { animation-delay: 0.9s; }
    .d5 { animation-delay: 1.1s; }
    .d6 { animation-delay: 1.3s; }
    .d7 { animation-delay: 1.5s; }
    .d8 { animation-delay: 1.7s; }
    .d9 { animation-delay: 1.9s; }
    .d10 { animation-delay: 2.1s; }
  </style>

  <rect width="520" height="420" rx="16" fill="#F0FDF4"/>

  <!-- Title -->
  <text x="260" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#14532D" class="title">Zeitstrahl: Deutsche Geschichte 1933&#x2013;2002</text>
  <text x="260" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534" class="title">Die wichtigsten Jahreszahlen f&#xFC;r den Einb&#xFC;rgerungstest</text>

  <!-- Timeline line -->
  <line x1="60" y1="70" x2="60" y2="400" stroke="#16A34A" stroke-width="3" class="timeline"/>

  <!-- 1933 -->
  <g class="dot d1">
    <circle cx="60" cy="74" r="6" fill="#991B1B"/>
    <rect x="80" y="60" width="420" height="28" rx="6" fill="#FEF2F2" stroke="#991B1B" stroke-width="0.5"/>
    <text x="90" y="72" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#991B1B">1933</text>
    <text x="130" y="72" font-family="system-ui, sans-serif" font-size="8" fill="#7F1D1D">Hitler wird Reichskanzler &#x2013; Beginn der NS-Diktatur</text>
    <text x="90" y="84" font-family="system-ui, sans-serif" font-size="7" fill="#991B1B">1938 Reichspogromnacht &#x2022; 1939&#x2013;45 Zweiter Weltkrieg &#x2022; 1944 Stauffenberg-Attentat</text>
  </g>

  <!-- 1945 -->
  <g class="dot d2">
    <circle cx="60" cy="110" r="6" fill="#14532D"/>
    <rect x="80" y="96" width="420" height="28" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="0.5"/>
    <text x="90" y="108" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1945</text>
    <text x="130" y="108" font-family="system-ui, sans-serif" font-size="8" fill="#14532D">Kriegsende &#x2013; Deutschland in 4 Besatzungszonen</text>
    <text x="90" y="120" font-family="system-ui, sans-serif" font-size="7" fill="#166534">8. Mai: Bedingungslose Kapitulation Deutschlands</text>
  </g>

  <!-- 1948-49 -->
  <g class="dot d3">
    <circle cx="60" cy="146" r="6" fill="#16A34A"/>
    <rect x="80" y="132" width="420" height="28" rx="6" fill="#BBF7D0" stroke="#16A34A" stroke-width="0.5"/>
    <text x="90" y="144" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1948&#x2013;49</text>
    <text x="146" y="144" font-family="system-ui, sans-serif" font-size="8" fill="#14532D">Berliner Luftbr&#xFC;cke</text>
    <text x="90" y="156" font-family="system-ui, sans-serif" font-size="7" fill="#166534">Versorgung West-Berlins durch die Westalliierten</text>
  </g>

  <!-- 1949 -->
  <g class="dot d4">
    <circle cx="60" cy="182" r="6" fill="#14532D"/>
    <rect x="80" y="168" width="420" height="28" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="0.5"/>
    <text x="90" y="180" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1949</text>
    <text x="130" y="180" font-family="system-ui, sans-serif" font-size="8" fill="#14532D">Doppelgr&#xFC;ndung: BRD (23. Mai) und DDR (7. Okt.)</text>
    <text x="90" y="192" font-family="system-ui, sans-serif" font-size="7" fill="#166534">Grundgesetz tritt in Kraft &#x2022; Teilung Deutschlands</text>
  </g>

  <!-- 1953 + 1957 -->
  <g class="dot d5">
    <circle cx="60" cy="218" r="6" fill="#16A34A"/>
    <rect x="80" y="204" width="420" height="28" rx="6" fill="#BBF7D0" stroke="#16A34A" stroke-width="0.5"/>
    <text x="90" y="216" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1953/57</text>
    <text x="146" y="216" font-family="system-ui, sans-serif" font-size="8" fill="#14532D">DDR-Aufstand (17. Juni) &#x2022; R&#xF6;mische Vertr&#xE4;ge (EWG)</text>
    <text x="90" y="228" font-family="system-ui, sans-serif" font-size="7" fill="#166534">6 L&#xE4;nder gr&#xFC;nden die Europ&#xE4;ische Wirtschaftsgemeinschaft</text>
  </g>

  <!-- 1961 -->
  <g class="dot d6">
    <circle cx="60" cy="254" r="6" fill="#991B1B"/>
    <rect x="80" y="240" width="420" height="28" rx="6" fill="#FEF2F2" stroke="#991B1B" stroke-width="0.5"/>
    <text x="90" y="252" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#991B1B">1961</text>
    <text x="130" y="252" font-family="system-ui, sans-serif" font-size="8" fill="#7F1D1D">Bau der Berliner Mauer (13. August)</text>
    <text x="90" y="264" font-family="system-ui, sans-serif" font-size="7" fill="#991B1B">Berlin wird geteilt &#x2013; 28 Jahre lang (bis 1989)</text>
  </g>

  <!-- 1967 + 1970 -->
  <g class="dot d7">
    <circle cx="60" cy="290" r="6" fill="#16A34A"/>
    <rect x="80" y="276" width="420" height="28" rx="6" fill="#BBF7D0" stroke="#16A34A" stroke-width="0.5"/>
    <text x="90" y="288" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1967/70</text>
    <text x="146" y="288" font-family="system-ui, sans-serif" font-size="8" fill="#14532D">EG-Fusion &#x2022; Brandts Kniefall in Warschau (Ostpolitik)</text>
    <text x="90" y="300" font-family="system-ui, sans-serif" font-size="7" fill="#166534">1985: Schengener Abkommen &#x2013; Reisen ohne Passkontrolle</text>
  </g>

  <!-- 1989 -->
  <g class="dot d8">
    <circle cx="60" cy="326" r="6" fill="#14532D"/>
    <rect x="80" y="312" width="420" height="28" rx="6" fill="#DCFCE7" stroke="#14532D" stroke-width="1"/>
    <text x="90" y="324" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1989</text>
    <text x="130" y="324" font-family="system-ui, sans-serif" font-size="8" fill="#14532D">&#x1F389; Fall der Berliner Mauer (9. November)</text>
    <text x="90" y="336" font-family="system-ui, sans-serif" font-size="7" fill="#166534">Friedliche Revolution &#x2013; &#x201E;Wir sind das Volk!&#x201C;</text>
  </g>

  <!-- 1990 -->
  <g class="dot d9">
    <circle cx="60" cy="362" r="6" fill="#14532D"/>
    <rect x="80" y="348" width="420" height="28" rx="6" fill="#DCFCE7" stroke="#14532D" stroke-width="1"/>
    <text x="90" y="360" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1990</text>
    <text x="130" y="360" font-family="system-ui, sans-serif" font-size="8" fill="#14532D">&#x1F1E9;&#x1F1EA; Wiedervereinigung (3. Oktober = Nationalfeiertag)</text>
    <text x="90" y="372" font-family="system-ui, sans-serif" font-size="7" fill="#166534">5 neue Bundesl&#xE4;nder &#x2022; 18. M&#xE4;rz 1990: erste freie Wahl in der DDR</text>
  </g>

  <!-- 1993 + 2002 -->
  <g class="dot d10">
    <circle cx="60" cy="398" r="6" fill="#16A34A"/>
    <rect x="80" y="384" width="420" height="28" rx="6" fill="#BBF7D0" stroke="#16A34A" stroke-width="0.5"/>
    <text x="90" y="396" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1993/02</text>
    <text x="146" y="396" font-family="system-ui, sans-serif" font-size="8" fill="#14532D">&#x1F1EA;&#x1F1FA; Gr&#xFC;ndung der EU (Maastricht) &#x2022; &#x1F4B6; Euro als Bargeld</text>
    <text x="90" y="408" font-family="system-ui, sans-serif" font-size="7" fill="#166534">Vertrag von Maastricht 1993 &#x2022; Euro-Einf&#xFC;hrung 2002</text>
  </g>
</svg>