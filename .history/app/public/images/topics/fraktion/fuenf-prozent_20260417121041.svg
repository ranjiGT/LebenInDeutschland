<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#FEF9C3"/>
  <!-- 5% bar visualization -->
  <!-- Full bar (100%) -->
  <rect x="40" y="60" width="320" height="40" rx="8" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
  <!-- 5% highlighted section -->
  <rect x="40" y="60" width="16" height="40" rx="8" fill="#DC2626"/>
  <rect x="48" y="60" width="8" height="40" fill="#DC2626"/>
  <!-- 100% label -->
  <text x="200" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">736 Abgeordnete (100%)</text>
  <!-- Arrow pointing to 5% -->
  <line x1="56" y1="108" x2="56" y2="130" stroke="#DC2626" stroke-width="2"/>
  <polygon points="50,130 62,130 56,140" fill="#DC2626"/>
  <!-- 5% detail box -->
  <rect x="16" y="145" width="80" height="35" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="56" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#DC2626">5 %</text>
  <!-- = 37 seats -->
  <text x="56" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#991B1B">= mind. 37</text>
  <text x="56" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#991B1B">Sitze</text>
  <!-- Checkmark: forms a Fraktion -->
  <rect x="140" y="145" width="240" height="70" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <path d="M160 175 L172 187 L195 160" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="215" y="172" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Fraktion gebildet!</text>
  <text x="215" y="192" font-family="Arial, sans-serif" font-size="11" fill="#166534">→ Mehr Rechte im Bundestag</text>
  <text x="215" y="206" font-family="Arial, sans-serif" font-size="11" fill="#166534">→ Gesetzentwürfe einbringen</text>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400E">Mindestgröße: 5 % der Abgeordneten</text>
</svg>